<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="1" stop-color="#111a33"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bull" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#1e2a4a" stroke-width="2"/>

  <!-- Subtle grid -->
  <g stroke="#1a2442" stroke-width="1" opacity="0.55">
    <line x1="96" y1="128" x2="416" y2="128"/>
    <line x1="96" y1="192" x2="416" y2="192"/>
    <line x1="96" y1="256" x2="416" y2="256"/>
    <line x1="96" y1="320" x2="416" y2="320"/>
    <line x1="96" y1="384" x2="416" y2="384"/>
  </g>

  <!-- Three candlesticks trending up -->
  <g>
    <!-- candle 1 (red, small) -->
    <line x1="128" y1="248" x2="128" y2="360" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
    <rect x="112" y="272" width="32" height="72" rx="4" fill="#ef4444"/>

    <!-- candle 2 (green, medium) -->
    <line x1="200" y1="192" x2="200" y2="336" stroke="url(#bull)" stroke-width="6" stroke-linecap="round"/>
    <rect x="184" y="224" width="32" height="96" rx="4" fill="url(#bull)"/>

    <!-- candle 3 (green, tall - breaking out) -->
    <line x1="272" y1="112" x2="272" y2="296" stroke="url(#bull)" stroke-width="6" stroke-linecap="round"/>
    <rect x="256" y="144" width="32" height="128" rx="4" fill="url(#bull)"/>
  </g>

  <!-- Lightning bolt overlay (the harness / execution layer) -->
  <g filter="url(#glow)">
    <path d="M340 96 L252 280 L316 280 L276 420 L404 216 L336 216 L372 96 Z"
          fill="url(#bolt)"
          stroke="#0a0f1e"
          stroke-width="6"
          stroke-linejoin="round"/>
  </g>
</svg>
